<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マネとく 訪問者ダッシュボード</title>
<meta name="robots" content="noindex,nofollow">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0f1e;
    --bg2: #0d1b2a;
    --bg3: #112033;
    --accent: #00d4aa;
    --accent2: #2563eb;
    --warn: #f59e0b;
    --text: #f0f4f8;
    --muted: rgba(240, 244, 248, 0.55);
    --border: rgba(255, 255, 255, 0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }
  header {
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  h1 { font-size: 22px; font-weight: 900; letter-spacing: -0.3px; }
  h1 span { color: var(--accent); }
  .meta { font-size: 12px; color: var(--muted); }
  .meta button {
    background: var(--accent); color: #000; border: none;
    padding: 6px 14px; border-radius: 6px; font-weight: 700; cursor: pointer;
    margin-left: 8px;
  }
  .meta button:hover { opacity: 0.85; }

  main { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .kpi {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    transition: transform 0.2s, border-color 0.2s;
  }
  .kpi:hover { transform: translateY(-2px); border-color: var(--accent); }
  .kpi-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .kpi-value { font-size: 36px; font-weight: 900; color: var(--accent); line-height: 1.1; }
  .kpi-unit { font-size: 14px; color: var(--muted); margin-left: 4px; font-weight: 500; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
  }
  .card h2 {
    font-size: 14px; font-weight: 800; color: var(--accent); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .card h2::before { content: '📊'; }
  .card.sources h2::before { content: '🌐'; }
  .card.articles h2::before { content: '📰'; }
  .card.recent h2::before { content: '⏱️'; }

  .rank-list { list-style: none; }
  .rank-list li {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    font-size: 14px;
  }
  .rank-list li:last-child { border-bottom: none; }
  .rank-num {
    background: var(--bg3); color: var(--accent);
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800;
  }
  .rank-list li:nth-child(1) .rank-num { background: #d97706; color: #fff; }
  .rank-list li:nth-child(2) .rank-num { background: #6b7280; color: #fff; }
  .rank-list li:nth-child(3) .rank-num { background: #b45309; color: #fff; }
  .rank-name {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: rgba(240, 244, 248, 0.85);
  }
  .rank-name a { color: var(--accent2); text-decoration: none; }
  .rank-name a:hover { text-decoration: underline; }
  .rank-count {
    color: var(--accent); font-weight: 800; font-size: 14px;
    background: rgba(0, 212, 170, 0.1); padding: 2px 10px; border-radius: 8px;
  }

  .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 30px; }

  table.recent-tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.recent-tbl th {
    text-align: left; color: var(--muted); font-weight: 600; padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }
  table.recent-tbl td { padding: 8px; border-bottom: 1px solid var(--border); }
  table.recent-tbl tr:last-child td { border-bottom: none; }
  .time { color: var(--muted); white-space: nowrap; }

  .chart-wrap { height: 240px; }

  footer {
    text-align: center; padding: 24px; color: var(--muted); font-size: 11px;
    border-top: 1px solid var(--border); margin-top: 40px;
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<header>
  <h1>マネ<span>とく</span> 訪問者ダッシュボード</h1>
  <div class="meta">
    <span id="lastUpdate">読み込み中…</span>
    <button onclick="loadAll()">🔄 更新</button>
  </div>
</header>

<main>
  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-label">今日のPV</div>
      <div class="kpi-value" id="kpi-today">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">累計PV</div>
      <div class="kpi-value" id="kpi-total">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">記録日数</div>
      <div class="kpi-value" id="kpi-days">—<span class="kpi-unit">日</span></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">記事数</div>
      <div class="kpi-value" id="kpi-articles">—</div>
    </div>
  </div>

  <div class="card">
    <h2>過去30日のPV推移</h2>
    <div class="chart-wrap"><canvas id="chart-trend"></canvas></div>
  </div>

  <div class="grid" style="margin-top: 20px;">
    <div class="card articles">
      <h2>記事別ランキング</h2>
      <ol class="rank-list" id="list-articles"><li class="empty">データ待ち…</li></ol>
    </div>
    <div class="card sources">
      <h2>流入元ランキング</h2>
      <ol class="rank-list" id="list-sources"><li class="empty">データ待ち…</li></ol>
    </div>
  </div>

  <div class="card recent" style="margin-top: 20px;">
    <h2>最新の訪問 100件</h2>
    <table class="recent-tbl" id="tbl-recent">
      <thead><tr><th>時刻</th><th>記事</th><th>流入元</th><th>画面</th></tr></thead>
      <tbody><tr><td colspan="4" class="empty">データ待ち…</td></tr></tbody>
    </table>
  </div>
</main>

<footer>
  Backend: Google Apps Script + Properties Service / GitHub Pages 配信 ·
  <a href="https://analytics.google.com/" target="_blank">GA4</a> ·
  <a href="https://clarity.microsoft.com/" target="_blank">Clarity</a>
</footer>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbyorFa9tcyASPuCwjerEzS8y3h7TffnMnudOLByKtRLiUSFDi36WS9hZvO82plxklaB/exec';

const ART_LABELS = {
  '106man': '106万円の壁',
  'aoyiro': '青色申告',
  'card': 'クレジットカード比較',
  'crypto-basic': 'ビットコイン入門',
  'crypto-exchange': '仮想通貨取引所',
  'crypto-market': '仮想通貨市場動向',
  'crypto-recommend': 'おすすめ仮想通貨',
  'crypto-tax': '仮想通貨の税金',
  'furusato': 'ふるさと納税',
  'hojokin': '事業者向け補助金',
  'hojokin2': '個人向け補助金',
  'ideco': 'iDeCo',
  'invoice': 'インボイス制度',
  'kinri': '住宅ローン金利',
  'nisa': '新NISA',
  'roudou': '労働基準法',
  'dashboard': '(ダッシュボード自身)',
};

let trendChart = null;

async function fetchJSON(url) {
  const r = await fetch(url);
  return r.json();
}

function fmt(n) { return n.toLocaleString('ja-JP'); }

function articleLink(slug) {
  const label = ART_LABELS[slug] || slug;
  if (slug === 'dashboard' || slug === 'index') return label;
  return '<a href="articles/' + slug + '.html" target="_blank">' + label + '</a>';
}

async function loadAll() {
  document.getElementById('lastUpdate').textContent = '更新中…';

  const [summary, recent] = await Promise.all([
    fetchJSON(GAS + '?action=summary').catch(e => ({ ok: false })),
    fetchJSON(GAS + '?action=recent').catch(e => ({ ok: false })),
  ]);

  if (!summary.ok) {
    document.getElementById('lastUpdate').textContent = '取得失敗';
    return;
  }

  // KPI
  document.getElementById('kpi-today').textContent = fmt(summary.totals.today);
  document.getElementById('kpi-total').textContent = fmt(summary.totals.pv);
  document.getElementById('kpi-days').innerHTML = summary.totals.days + '<span class="kpi-unit">日</span>';
  document.getElementById('kpi-articles').textContent = summary.topArticles.length;
  document.getElementById('lastUpdate').textContent = summary.totals.lastUpdate ? ('最終更新: ' + summary.totals.lastUpdate) : 'まだデータなし';

  // Trend chart
  renderTrend(summary.trend30);

  // Rankings
  renderArticles(summary.topArticles);
  renderSources(summary.topSources);

  // Recent table
  if (recent.ok) renderRecent(recent.logs);
}

function renderTrend(trend30) {
  const labels = trend30.map(d => d.date.substring(5));
  const data = trend30.map(d => d.count);

  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('chart-trend').getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'PV',
        data,
        borderColor: '#00d4aa',
        backgroundColor: 'rgba(0, 212, 170, 0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 4,
        pointBackgroundColor: '#00d4aa',
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: 'rgba(240,244,248,0.6)' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { beginAtZero: true, ticks: { color: 'rgba(240,244,248,0.6)', precision: 0 }, grid: { color: 'rgba(255,255,255,0.05)' } },
      },
    },
  });
}

function renderArticles(items) {
  const ul = document.getElementById('list-articles');
  if (!items.length) { ul.innerHTML = '<li class="empty">まだ訪問なし</li>'; return; }
  ul.innerHTML = items.map((it, i) =>
    '<li><span class="rank-num">' + (i + 1) + '</span>'
    + '<span class="rank-name">' + articleLink(it[0]) + '</span>'
    + '<span class="rank-count">' + fmt(it[1]) + '</span></li>'
  ).join('');
}

function renderSources(items) {
  const ul = document.getElementById('list-sources');
  if (!items.length) { ul.innerHTML = '<li class="empty">まだ流入なし</li>'; return; }
  ul.innerHTML = items.map((it, i) =>
    '<li><span class="rank-num">' + (i + 1) + '</span>'
    + '<span class="rank-name">' + (it[0] === 'direct' ? '直接アクセス' : it[0]) + '</span>'
    + '<span class="rank-count">' + fmt(it[1]) + '</span></li>'
  ).join('');
}

function renderRecent(logs) {
  const tbody = document.querySelector('#tbl-recent tbody');
  if (!logs.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty">まだ訪問なし</td></tr>'; return; }
  tbody.innerHTML = logs.map(r => {
    const t = r[0].substring(5); // MM-DD HH:MM:SS
    return '<tr><td class="time">' + t + '</td><td>' + articleLink(r[1]) + '</td><td>' + (r[2] === 'direct' ? '直接' : r[2]) + '</td><td class="time">' + r[3] + '</td></tr>';
  }).join('');
}

// 自動更新（60秒）
loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
